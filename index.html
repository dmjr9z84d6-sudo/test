<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07070C">
  <!-- Cache-Control: index.html selbst soll nie aus dem Cache geladen werden,
       damit die aktuellste Version-Referenz auf AllesDa.js durchkommt. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>AllesDa v79 &mdash; Immobilienverwaltung</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      height: 100%; overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }
    body {
      background: #07070C; color: #F0F0FF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
    }
    #root { height: 100vh; }
    #ladeIndikator {
      position: fixed; top: 0; right: 0; bottom: 0; left: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #07070C; color: #F0F0FF;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #ladeIndikator .spinner {
      width: 36px; height: 36px;
      border: 3px solid #252540;
      border-top-color: #0E7490;
      border-radius: 50%;
      animation: ad-spin 0.8s linear infinite;
    }
    @keyframes ad-spin { to { transform: rotate(360deg); } }
    #ladeIndikator .titel {
      margin-top: 18px;
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.02em;
    }
    #ladeIndikator .titel .akzent { color: #0E7490; }
    #ladeIndikator .sub {
      margin-top: 6px;
      font-size: 11px; color: #7575A0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="ladeIndikator">
    <div class="spinner"></div>
    <div class="titel">Alles<span class="akzent">Da</span></div>
    <div class="sub">wird geladen&hellip;  <span style="opacity: 0.5;">v79</span></div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <!-- Cache-Busting durch Versions-Query: jeder Build erzeugt eine neue URL -->
  <script src="AllesDa.js?v=79"></script>
</body>
</html>
