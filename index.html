<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>AllesDa v6.78</title>
  <style>
    /* iOS PWA Standalone: html/body bekommen vom User-Agent overflow:hidden;
       per JS mit !important überschrieben (siehe unten). Hier die Basis. */
    html, body {
      margin: 0;
      padding: 0;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
    }
    * { box-sizing: border-box; }
    #root { min-height: 100dvh; }
    /* Ladeanzeige bis das Bundle initialisiert */
    #ad-loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; background: #0a0a0f; z-index: 9999;
    }
    #ad-loader .brand { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
    #ad-loader .brand span { color: #2dd4bf; }
    #ad-loader .ver { font-size: 12px; color: #6b7280; }
    #ad-loader .spinner {
      width: 26px; height: 26px; border: 3px solid #1f2937; border-top-color: #2dd4bf;
      border-radius: 50%; animation: adspin 0.8s linear infinite;
    }
    @keyframes adspin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="ad-loader">
    <div class="brand">Alles<span>Da</span></div>
    <div class="ver">v6.78 wird geladen…</div>
    <div class="spinner"></div>
  </div>

  <script>
    // iOS PWA Standalone erzwingt overflow:hidden auf html/body via UA-Stylesheet.
    // CSS allein reicht nicht — per JS mit !important überschreiben, damit der
    // natürliche Body-Scroll (Mobile) funktioniert.
    (function () {
      try {
        var standalone = window.navigator.standalone === true
          || (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches);
        if (standalone) {
          document.documentElement.style.setProperty("overflow", "visible", "important");
          document.body.style.setProperty("overflow", "visible", "important");
        }
      } catch (e) {}
    })();
  </script>

  <!-- App-Bundle (React inklusive). Cache-Bust über ?v= bei jedem Build erhöhen. -->
  <script src="./AllesDa.js?v=154"></script>

  <script>
    // Loader entfernen, sobald React den Root befüllt hat.
    (function () {
      var root = document.getElementById("root");
      var loader = document.getElementById("ad-loader");
      function check() {
        if (root && root.childNodes.length > 0) {
          if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
        } else {
          requestAnimationFrame(check);
        }
      }
      requestAnimationFrame(check);
      // Sicherheitsnetz: spätestens nach 5s ausblenden.
      setTimeout(function () {
        if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
      }, 5000);
    })();
  </script>
</body>
</html>
